# MySQL. Versions 5.6.4 and up are supported.
#
# Install the MySQL driver
#   gem install mysql2
#
# Ensure the MySQL gem is defined in your Gemfile
#   gem "mysql2"
#
# And be sure to use new-style password hashing:
#   https://dev.mysql.com/doc/refman/5.7/en/password-hashing.html
#
#Define as configurações padrões do banco
default: &default
  adapter: mysql2
  encoding: utf8mb4
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  username: root
  password:
  host: <%= ENV.fetch("DB_HOST") { "127.0.0.1" } %>

#Usado para desenvolvimento
development:
  <<: *default
  database: meu_projeto_development

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
#Usado para testes automatizados
test:
  <<: *default
  database: meu_projeto_test

# As with config/credentials.yml, you never want to store sensitive information,
# like your database password, in your source code. If your source code is
# ever seen by anyone, they now have access to your database.
#
# Instead, provide the password or a full connection URL as an environment
# variable when you boot the app. For example:
#
#   DATABASE_URL="mysql2://myuser:mypass@localhost/somedatabase"
#
# If the connection URL is provided in the special DATABASE_URL environment
# variable, Rails will automatically merge its configuration values on top of
# the values provided in this file. Alternatively, you can specify a connection
# URL environment variable explicitly:
#
#   production:
#     url: <%= ENV["MY_APP_DATABASE_URL"] %>
#
# Connection URLs for non-primary databases can also be configured using
# environment variables. The variable name is formed by concatenating the
# connection name with `_DATABASE_URL`. For example:
#
#   CACHE_DATABASE_URL="mysql2://cacheuser:cachepass@localhost/cachedatabase"
#
# Read https://guides.rubyonrails.org/configuring.html#configuring-a-database
# for a full overview on how database connection configuration can be specified.
#
#Separado em vários bancos para escalar
#Production cria sua propria referencia para a conexão principal com o banco, e posteriormente, as outras
#conexões recebem essa referencia
production:
  #banco principal
  primary: &primary_production
    <<: *default
    database: meu_projeto_production
    username: meu_projeto
    password: <%= ENV["MEU_PROJETO_DATABASE_PASSWORD"] %>
  #cache de dados -> melhora performance
  cache:
    <<: *primary_production
    database: meu_projeto_production_cache
    migrations_paths: db/cache_migrate
  #filas de jobs->processa jobs assincronos
  queue:
    <<: *primary_production
    database: meu_projeto_production_queue
    migrations_paths: db/queue_migrate
  #websockets(ActionCable)->chat/notifiações
  cable:
    <<: *primary_production
    database: meu_projeto_production_cable
    migrations_paths: db/cable_migrate
